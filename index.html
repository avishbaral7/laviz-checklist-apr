<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laviz Daily Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0ede8; --muted: #6b6b6b; --accent: #c8f060; --accent2: #f0c060;
    --danger: #f06060; --done-bg: rgba(200,240,96,0.06); --done-border: rgba(200,240,96,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; }
  .noise { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); opacity: 0.4; }
  .container { max-width: 720px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }

  .header { margin-bottom: 36px; }
  .brand { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.1; }
  .title span { color: var(--accent); }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 8px; font-weight: 300; }

  /* Streak */
  .streak-banner { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
  .streak-left { display: flex; align-items: center; gap: 12px; }
  .streak-fire { font-size: 30px; line-height: 1; }
  .streak-count { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800; color: var(--accent2); line-height: 1; }
  .streak-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .streak-right { text-align: right; }
  .streak-best-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); }
  .streak-best-lbl { font-size: 11px; color: var(--muted); }
  .streak-warning { width: 100%; font-size: 12px; color: var(--danger); font-weight: 500; padding: 8px 14px; border-radius: 6px; border: 0.5px solid rgba(240,96,96,0.3); background: rgba(240,96,96,0.06); display: none; }
  .streak-warning.show { display: block; }

  /* Dashboard */
  .dashboard { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; padding: 18px 20px; margin-bottom: 24px; }
  .dash-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .dash-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 14px; }
  .dash-cell { text-align: center; }
  .dash-dname { font-size: 9px; color: var(--muted); margin-bottom: 5px; font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.04em; }
  .dash-dot { width: 30px; height: 30px; border-radius: 50%; margin: 0 auto; border: 0.5px solid var(--border2); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--muted); font-family: 'Syne', sans-serif; transition: all 0.3s; }
  .dash-dot.full { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }
  .dash-dot.partial { background: rgba(200,240,96,0.12); color: var(--accent); border-color: var(--done-border); }
  .dash-dot.future { opacity: 0.25; }
  .dash-stats { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .dash-stat { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .dash-stat strong { color: var(--accent); font-weight: 500; font-size: 14px; }
  .con-bar { flex: 1; min-width: 80px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .con-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

  /* Month tabs */
  .month-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .mtab { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; padding: 8px 22px; border-radius: 4px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .mtab:hover { color: var(--text); }
  .mtab.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }

  /* Day nav */
  .day-nav { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }
  .day-btn { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 4px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; text-align: center; }
  .day-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .day-btn.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }
  .day-btn.complete { border-color: var(--done-border); color: var(--accent); }
  .day-btn.istoday { border-color: var(--accent2); color: var(--accent2); }
  .day-btn.istoday.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); }

  .month-sec { display: none; }
  .month-sec.active { display: block; }

  /* Day view */
  .day-view { display: none; animation: fadeIn 0.2s ease; }
  .day-view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .day-header { margin-bottom: 28px; }
  .day-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .day-name { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .today-pill { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(240,192,96,0.15); color: var(--accent2); border: 0.5px solid rgba(240,192,96,0.3); font-family: 'Syne', sans-serif; font-weight: 700; letter-spacing: 0.08em; }
  .day-date { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: 0.05em; }
  .prog-bar { margin-top: 14px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .prog-lbl { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .section { margin-bottom: 28px; }
  .sec-title { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }

  .task { border: 0.5px solid var(--border); border-radius: 8px; margin-bottom: 8px; background: var(--surface); transition: all 0.25s; overflow: hidden; }
  .task:hover { border-color: var(--border2); }
  .task.done { background: var(--done-bg); border-color: var(--done-border); }
  .task-top { display: flex; align-items: center; gap: 14px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .chkbox { width: 20px; height: 20px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .task.done .chkbox { background: var(--accent); border-color: var(--accent); }
  .chk-icon { opacity: 0; transform: scale(0.5); transition: all 0.2s; }
  .task.done .chk-icon { opacity: 1; transform: scale(1); }
  .task-lbl { font-size: 14px; font-weight: 500; flex: 1; transition: color 0.2s; }
  .task.done .task-lbl { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(107,107,107,0.5); }
  .exp-btn { font-size: 10px; color: var(--muted); padding: 3px 8px; border-radius: 4px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.05em; transition: all 0.2s; white-space: nowrap; }
  .exp-btn:hover { border-color: var(--border2); color: var(--text); }
  .task-notes { display: none; padding: 0 16px 14px 50px; }
  .task-notes.open { display: block; }
  .notes-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; font-family: 'Syne', sans-serif; font-weight: 700; }
  .notes-ta { width: 100%; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300; resize: none; min-height: 72px; line-height: 1.6; outline: none; transition: border-color 0.2s; }
  .notes-ta:focus { border-color: rgba(200,240,96,0.3); }
  .notes-ta::placeholder { color: var(--muted); }

  .summary { margin-top: 32px; padding: 16px 20px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .sum-text { font-size: 12px; color: var(--muted); font-weight: 300; }
  .sum-text strong { color: var(--accent); font-weight: 500; }
  .save-btn { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; padding: 8px 18px; border-radius: 4px; border: none; background: var(--accent); color: #0e0e0e; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .save-btn:hover { background: #d4f570; }
  .save-btn:active { transform: scale(0.97); }
  .saved-msg { font-size: 11px; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.08em; opacity: 0; transition: opacity 0.3s; }
  .saved-msg.show { opacity: 1; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">

  <div class="header">
    <div class="brand">Laviz Nepal × India</div>
    <div class="title">Daily Checklist <span id="headerSpan">April</span></div>
    <div class="subtitle">Apr 20 – May 31, 2026 · Stay consistent, stay building.</div>
  </div>

  <div class="streak-banner">
    <div class="streak-left">
      <div class="streak-fire">🔥</div>
      <div>
        <div class="streak-count" id="streakCount">0</div>
        <div class="streak-lbl">Day Streak</div>
      </div>
    </div>
    <div class="streak-right">
      <div class="streak-best-val" id="bestStreak">0</div>
      <div class="streak-best-lbl">Best streak</div>
    </div>
    <div class="streak-warning" id="streakWarn">⚠️ Complete today's tasks to keep your streak alive!</div>
  </div>

  <div class="dashboard">
    <div class="dash-title">Weekly Progress</div>
    <div class="dash-week" id="dashWeek"></div>
    <div class="dash-stats">
      <div class="dash-stat">Consistency <strong id="conPct">0%</strong> 🔥</div>
      <div class="con-bar"><div class="con-fill" id="conFill" style="width:0%"></div></div>
      <div class="dash-stat"><strong id="weekDone">0</strong> day streak this week</div>
    </div>
  </div>

  <div class="month-tabs">
    <div class="mtab active" id="mtab-apr" onclick="switchMonth('apr')">April</div>
    <div class="mtab" id="mtab-may" onclick="switchMonth('may')">May</div>
  </div>

  <div class="month-sec active" id="msec-apr">
    <div class="day-nav" id="nav-apr"></div>
    <div id="views-apr"></div>
  </div>
  <div class="month-sec" id="msec-may">
    <div class="day-nav" id="nav-may"></div>
    <div id="views-may"></div>
  </div>

</div>
<script>
const DAY_NAMES  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function makeDay(year, mo, d) {
  const dt = new Date(year, mo, d);
  return {
    key: `${year}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
    d, mo, year,
    name: DAY_NAMES[dt.getDay()],
    short: DAY_SHORT[dt.getDay()],
    label: `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo]} ${d}, ${year}`,
    dt
  };
}

const APR = [], MAY = [];
for (let d=20;d<=30;d++) APR.push(makeDay(2026,3,d));
for (let d=1;d<=31;d++) MAY.push(makeDay(2026,4,d));
const ALL = [...APR,...MAY];

const NOW = new Date();
const TODAY = `${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}-${String(NOW.getDate()).padStart(2,'0')}`;

const SECTIONS = [
  { title:'Morning', tasks:[
    {id:'wakeup',   label:'Wake up at 6 AM',           note:false},
    {id:'exercise', label:'Exercise / Walk',            note:false},
    {id:'shower',   label:'Shower',                     note:false},
    {id:'plan',     label:'Plan the Day',               note:true, ph:'What are my goals for today?'},
  ]},
  { title:'Work', tasks:[
    {id:'office',   label:'Office',                     note:true, ph:'What did I do at the office today?'},
    {id:'content',  label:'Content Activity',           note:true, ph:'What content did I shoot / edit / post?'},
    {id:'stories',  label:'Post Stories on Instagram',  note:false},
  ]},
  { title:'Knowledge', tasks:[
    {id:'learn',    label:'Learn',                      note:true, ph:'What did I learn today?'},
  ]},
  { title:'Evening', tasks:[
    {id:'finance',  label:'Log Finances (10 mins)',     note:false},
    {id:'review',   label:'Review & Plan Tomorrow',     note:false},
  ]}
];

const TASK_IDS = SECTIONS.flatMap(s=>s.tasks.map(t=>t.id));
const TOTAL = TASK_IDS.length;

let ST = {};
try { ST = JSON.parse(localStorage.getItem('laviz_v3')||'{}'); } catch(e){}
function persist(){ localStorage.setItem('laviz_v3', JSON.stringify(ST)); }
function getT(key,id){ return (ST[key]&&ST[key][id]) ? ST[key][id] : {done:false,note:''}; }
function doneCnt(key){ return TASK_IDS.filter(id=>getT(key,id).done).length; }
function isComplete(key){ return doneCnt(key)===TOTAL; }

function calcStreak(){
  let s=0;
  const sorted=[...ALL].filter(d=>d.dt<=NOW).sort((a,b)=>b.dt-a.dt);
  for(const day of sorted){
    if(isComplete(day.key)) s++;
    else if(day.key===TODAY) continue;
    else break;
  }
  return s;
}
function calcBest(){
  let best=0,cur=0;
  const sorted=[...ALL].filter(d=>d.dt<=NOW).sort((a,b)=>a.dt-b.dt);
  for(const day of sorted){ if(isComplete(day.key)){cur++;best=Math.max(best,cur);}else cur=0; }
  return best;
}

function updateStreak(){
  const s=calcStreak(), b=Math.max(calcBest(),s);
  document.getElementById('streakCount').textContent=s;
  document.getElementById('bestStreak').textContent=b;
  const warn=document.getElementById('streakWarn');
  warn.classList.toggle('show', s>0 && doneCnt(TODAY)<TOTAL);
}

function updateDash(){
  const dow=NOW.getDay();
  const offset=dow===0?-6:1-dow;
  const week=[];
  for(let i=0;i<7;i++){
    const d=new Date(NOW); d.setDate(NOW.getDate()+offset+i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    week.push({key,d,short:DAY_SHORT[d.getDay()]});
  }
  const past=week.filter(w=>w.d<=NOW);
  const comp=week.filter(w=>isComplete(w.key)).length;
  const pct=past.length?Math.round(comp/past.length*100):0;

  document.getElementById('dashWeek').innerHTML=week.map(w=>{
    const fut=w.d>NOW, full=isComplete(w.key), cnt=doneCnt(w.key);
    const cls=fut?'future':full?'full':cnt>0?'partial':'';
    return `<div class="dash-cell"><div class="dash-dname">${w.short}</div><div class="dash-dot ${cls}">${full?'✓':cnt||''}</div></div>`;
  }).join('');

  document.getElementById('conPct').textContent=pct+'%';
  document.getElementById('conFill').style.width=pct+'%';
  document.getElementById('weekDone').textContent=pct+'%';
}

function buildDayEl(day){
  const div=document.createElement('div');
  div.className='day-view'; div.id=`day-${day.key}`;
  const done=doneCnt(day.key), pct=Math.round(done/TOTAL*100), isT=day.key===TODAY;
  div.innerHTML=`
    <div class="day-header">
      <div class="day-name-row">
        <div class="day-name">${day.name}</div>
        ${isT?'<span class="today-pill">TODAY</span>':''}
      </div>
      <div class="day-date">${day.label}</div>
      <div class="prog-bar"><div class="prog-fill" id="pf-${day.key}" style="width:${pct}%"></div></div>
      <div class="prog-lbl" id="pl-${day.key}">${done} of ${TOTAL} tasks done</div>
    </div>
    ${SECTIONS.map(sec=>`
      <div class="section">
        <div class="sec-title">${sec.title}</div>
        ${sec.tasks.map(t=>{
          const s=getT(day.key,t.id);
          return `<div class="task ${s.done?'done':''}" id="tk-${day.key}-${t.id}">
            <div class="task-top" onclick="toggleT('${day.key}','${t.id}')">
              <div class="chkbox"><svg class="chk-icon" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="#0e0e0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
              <span class="task-lbl">${t.label}</span>
              ${t.note?`<button class="exp-btn" onclick="event.stopPropagation();toggleN('${day.key}','${t.id}')">Notes</button>`:''}
            </div>
            ${t.note?`<div class="task-notes ${s.note?'open':''}" id="nt-${day.key}-${t.id}"><div class="notes-lbl">Your notes</div><textarea class="notes-ta" placeholder="${t.ph||''}" oninput="saveN('${day.key}','${t.id}',this.value)">${s.note||''}</textarea></div>`:''}
          </div>`;
        }).join('')}
      </div>`).join('')}
    <div class="summary">
      <div class="sum-text"><strong id="sm-${day.key}">${done}/${TOTAL}</strong> tasks completed</div>
      <span class="saved-msg" id="sv-${day.key}">Saved ✓</span>
      <button class="save-btn" onclick="saveDay('${day.key}')">Save Day</button>
    </div>`;
  return div;
}

function toggleT(key,id){
  if(!ST[key])ST[key]={};
  if(!ST[key][id])ST[key][id]={done:false,note:''};
  ST[key][id].done=!ST[key][id].done; persist();
  document.getElementById(`tk-${key}-${id}`).classList.toggle('done',ST[key][id].done);
  refreshDay(key); updateDayBtn(key); updateStreak(); updateDash();
}
function toggleN(key,id){ document.getElementById(`nt-${key}-${id}`).classList.toggle('open'); }
function saveN(key,id,v){
  if(!ST[key])ST[key]={};
  if(!ST[key][id])ST[key][id]={done:false,note:''};
  ST[key][id].note=v; persist();
}
function refreshDay(key){
  const done=doneCnt(key), pct=Math.round(done/TOTAL*100);
  const pf=document.getElementById(`pf-${key}`);
  const pl=document.getElementById(`pl-${key}`);
  const sm=document.getElementById(`sm-${key}`);
  if(pf)pf.style.width=pct+'%';
  if(pl)pl.textContent=`${done} of ${TOTAL} tasks done`;
  if(sm)sm.textContent=`${done}/${TOTAL}`;
}
function updateDayBtn(key){
  const btn=document.getElementById(`btn-${key}`);
  if(!btn)return;
  btn.classList.toggle('complete',isComplete(key));
}
function saveDay(key){
  persist();
  const m=document.getElementById(`sv-${key}`);
  if(m){m.classList.add('show');setTimeout(()=>m.classList.remove('show'),2000);}
}
function showDay(key){
  document.querySelectorAll('.day-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  const v=document.getElementById(`day-${key}`), b=document.getElementById(`btn-${key}`);
  if(v)v.classList.add('active');
  if(b)b.classList.add('active');
}

function switchMonth(m){
  document.querySelectorAll('.month-sec').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`msec-${m}`).classList.add('active');
  document.getElementById(`mtab-${m}`).classList.add('active');
  document.getElementById('headerSpan').textContent=m==='apr'?'April':'May';
  const days=m==='apr'?APR:MAY;
  const todayDay=days.find(d=>d.key===TODAY);
  showDay(todayDay?todayDay.key:days[0].key);
}

function buildMonth(days, navId, viewsId){
  const nav=document.getElementById(navId), views=document.getElementById(viewsId);
  days.forEach(day=>{
    const btn=document.createElement('button');
    btn.className='day-btn'+(day.key===TODAY?' istoday':'');
    btn.id=`btn-${day.key}`;
    btn.innerHTML=`<span style="font-size:10px;display:block;opacity:0.6">${day.short}</span>${day.d}`;
    btn.onclick=()=>showDay(day.key);
    nav.appendChild(btn);
    views.appendChild(buildDayEl(day));
    updateDayBtn(day.key);
  });
}

buildMonth(APR,'nav-apr','views-apr');
buildMonth(MAY,'nav-may','views-may');

// Open today's month automatically
const inApr=APR.find(d=>d.key===TODAY);
const inMay=MAY.find(d=>d.key===TODAY);
if(inMay){ switchMonth('may'); }
